<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BLTZ — Player Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Google Fonts CDN replaces local TTFs from the design package -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ========================================================================
   COLORS, TYPE, SCALE — from colors_and_type.css
   ======================================================================== */
:root {
  /* BRAND COLORS */
  --bltz-gold:          #F5A623;
  --bltz-gold-bright:   #FFB940;
  --bltz-gold-deep:     #C77D00;
  --bltz-gold-glow:     rgba(245,166,35,0.25);
  --bltz-blue:          #1A3DCC;
  --bltz-blue-bright:   #2952FF;
  --bltz-blue-mid:      #1230A0;
  --bltz-blue-deep:     #0A1A6E;
  --bltz-blue-glow:     rgba(41,82,255,0.20);
  --bltz-navy:          #0B0E1A;
  --bltz-navy-surface:  #0F1320;
  --bltz-navy-card:     #131829;
  --bltz-navy-elevated: #1A2035;
  --bltz-navy-border:   #1E2640;
  /* NEUTRALS */
  --bltz-white:         #FFFFFF;
  --bltz-white-80:      rgba(255,255,255,0.80);
  --bltz-white-50:      rgba(255,255,255,0.50);
  --bltz-white-20:      rgba(255,255,255,0.20);
  --bltz-white-08:      rgba(255,255,255,0.08);
  /* SEMANTIC */
  --bltz-success:       #00D68F;
  --bltz-warning:       #F5A623;
  --bltz-danger:        #FF3D5A;
  --bltz-info:          #2952FF;
  /* ALIASES */
  --bg:                 var(--bltz-navy);
  --bg-surface:         var(--bltz-navy-surface);
  --bg-card:            var(--bltz-navy-card);
  --bg-elevated:        var(--bltz-navy-elevated);
  --fg1:                var(--bltz-white);
  --fg2:                var(--bltz-white-80);
  --fg-muted:           var(--bltz-white-50);
  --fg-dim:             var(--bltz-white-20);
  --border:             var(--bltz-navy-border);
  --accent:             var(--bltz-gold);
  --accent-2:           var(--bltz-blue-bright);
  /* FAMILIES */
  --font-display:       'Barlow', 'Oswald', Impact, sans-serif;
  --font-body:          'Barlow', 'Inter', system-ui, sans-serif;
  --font-mono:          'JetBrains Mono', 'SF Mono', Menlo, monospace;
  /* SCALE */
  --text-2xs: 0.625rem; --text-xs: 0.75rem; --text-sm: 0.875rem;
  --text-base: 1rem; --text-lg: 1.125rem; --text-xl: 1.25rem;
  --text-2xl: 1.5rem; --text-3xl: 2rem; --text-4xl: 2.5rem;
  --text-5xl: 3.5rem; --text-6xl: 5rem; --text-7xl: 7rem;
  /* SPACING */
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem; --space-20: 5rem; --space-24: 6rem;
  /* RADII */
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
  --radius-xl: 16px; --radius-2xl: 24px; --radius-full: 9999px;
  /* SHADOWS */
  --shadow-sm:        0 2px 8px rgba(0,0,0,0.30);
  --shadow-card:      0 4px 24px rgba(0,0,0,0.40), 0 1px 0 rgba(255,255,255,0.04) inset;
  --shadow-elevated:  0 8px 48px rgba(0,0,0,0.60), 0 1px 0 rgba(255,255,255,0.06) inset;
  --shadow-glow-gold: 0 0 40px rgba(245,166,35,0.30), 0 0 80px rgba(245,166,35,0.10);
  --shadow-glow-blue: 0 0 40px rgba(41,82,255,0.30), 0 0 80px rgba(41,82,255,0.10);
  --shadow-btn-gold:  0 4px 20px rgba(245,166,35,0.40), 0 1px 0 rgba(255,255,255,0.20) inset;
  --shadow-btn-blue:  0 4px 20px rgba(41,82,255,0.40), 0 1px 0 rgba(255,255,255,0.10) inset;
  /* MOTION */
  --ease-snap:   cubic-bezier(0.25,0,0,1);
  --ease-bounce: cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:    cubic-bezier(0.16,1,0.3,1);
  --dur-fast: 120ms; --dur-base: 200ms; --dur-slow: 400ms; --dur-enter: 600ms;
  /* GRADIENTS */
  --grad-gold-cta:    linear-gradient(135deg, #FFB940 0%, #F5A623 60%, #C77D00 100%);
  --grad-blue-action: linear-gradient(135deg, #2952FF 0%, #1A3DCC 100%);
  --grad-team:        linear-gradient(90deg, #2952FF 0%, #F5A623 100%);
  --grad-field:       linear-gradient(135deg, #0A1A6E 0%, #131829 100%);
  --grad-gold-text:   linear-gradient(135deg, #FFB940 0%, #F5A623 50%, #C77D00 100%);

  /* LOCKER BRAND — defaults match THEME_PRESETS[0] (BLTZ Classic); overridden at runtime by V2PreviewPanel save */
  --brand-bg:        #0A0B16;
  --brand-accent:    #F5A623;
  --brand-accent-2:  #FFB940;
  --brand-surface:   #131829;
  --brand-text:      #FFFFFF;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--brand-bg); color: var(--brand-text); min-height: 100%; overflow-x: hidden; transition: background 0.25s ease; }
body { font-family: var(--font-body); line-height: 1.6; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
.no-scrollbar::-webkit-scrollbar { display: none; width: 0; height: 0; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
::placeholder { color: rgba(255,255,255,0.25); }
textarea { resize: vertical; }

/* TYPE CLASSES */
h1, .h1 { font-family: var(--font-display); font-weight: 900; font-size: clamp(4rem,10vw,7rem); line-height: 0.9; letter-spacing: -0.04em; text-transform: uppercase; color: var(--fg1); }
h2, .h2 { font-family: var(--font-display); font-weight: 800; font-size: var(--text-5xl); line-height: 0.9; letter-spacing: -0.03em; text-transform: uppercase; }
h3, .h3 { font-family: var(--font-display); font-weight: 800; font-size: var(--text-4xl); line-height: 1; letter-spacing: -0.02em; text-transform: uppercase; }
h4, .h4 { font-family: var(--font-display); font-weight: 700; font-size: var(--text-2xl); text-transform: uppercase; letter-spacing: 0.02em; }
h5, .h5, .card-title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); text-transform: uppercase; letter-spacing: 0.05em; }
.label, .eyebrow, .meta { font-family: var(--font-mono); font-weight: 600; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-muted); }
.eyebrow { color: var(--accent); letter-spacing: 0.20em; }

/* ========================================================================
   LAYOUT SHELL — from BLTZ Dashboard.html
   ======================================================================== */
.dash-shell { display: flex; min-height: 100vh; position: relative; }

/* LEFT SIDEBAR — pinned, never scrolls. Collapses 64 → 230 on hover (overlays main when expanded). */
.dash-sidebar {
  width: 64px; flex-shrink: 0;
  /* 70% brand-bg + 30% black keeps the sidebar slightly deeper than the page so the depth hierarchy holds across themes */
  background: color-mix(in srgb, var(--brand-bg) 70%, black);
  border-right: 1px solid #141929;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  height: 100vh; overflow: hidden;
  z-index: 100;
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.25s ease;
}
.dash-sidebar:hover { width: 230px; }
/* Reserve the 64px slot in the flex layout so .dash-main starts after the sidebar */
.dash-shell::before {
  content: ''; width: 64px; flex-shrink: 0;
}
.sb-label { opacity: 0; max-width: 0; overflow: hidden; white-space: nowrap;
  transition: opacity 0.15s, max-width 0.3s cubic-bezier(0.4,0,0.2,1);
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
.dash-sidebar:hover .sb-label { opacity: 1; max-width: 160px; }
.sb-wordmark { opacity: 0; max-width: 0; overflow: hidden; white-space: nowrap;
  transition: opacity 0.2s 0.05s, max-width 0.3s; }
.dash-sidebar:hover .sb-wordmark { opacity: 1; max-width: 140px; }

/* MAIN */
.dash-main { flex: 1; min-width: 0; overflow-x: hidden; }

/* RIGHT LIVE PREVIEW PANEL — fan/claim view + theme + fonts (per dashboard-plan.md) */
.locker-desktop {
  width: 0; flex-shrink: 0; background: #050610;
  border-left: 1px solid transparent;
  position: sticky; top: 0; height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
  transition: width 0.32s cubic-bezier(0.4,0,0.2,1), border-color 0.32s;
}
.locker-desktop.open { width: 340px; border-left-color: #141929; }
.locker-toggle-btn {
  position: fixed; right: 0; top: 50%; transform: translateY(-50%);
  background: #050610; border: 1px solid #141929; border-right: none;
  border-radius: 8px 0 0 8px; padding: 14px 8px; cursor: pointer; z-index: 200;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: rgba(255,255,255,0.45);
  transition: right 0.32s cubic-bezier(0.4,0,0.2,1), color 0.15s;
}
.locker-toggle-btn:hover { color: var(--brand-accent); border-color: color-mix(in srgb, var(--brand-accent) 35%, #141929); }
.locker-toggle-btn.panel-open { right: 340px; }

/* CARDS — surface follows brand so cards match the saved locker theme */
.card { background: color-mix(in srgb, var(--brand-surface) 60%, var(--brand-bg)); border: 1px solid #141929; border-radius: 16px; overflow: hidden; transition: background 0.25s ease, border-color 0.25s ease; }
.card-header {
  padding: 15px 18px; border-bottom: 1px solid #141929;
  position: relative;
  display: flex; justify-content: center; align-items: center;
  min-height: 52px;
}
/* Right-anchor anything that isn't the title (action buttons, status pills) */
.card-header > *:not(:first-child) {
  position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
}
.card-title {
  font-family: 'Barlow', sans-serif;
  font-weight: 700; font-size: 24px; line-height: 1;
  letter-spacing: 0.02em; text-transform: uppercase;
  text-align: center;
}

/* BUTTONS — gold pulls from brand vars so applying a locker theme recolors the dashboard */
.btn-gold {
  background: linear-gradient(135deg, var(--brand-accent-2), var(--brand-accent));
  color: var(--brand-bg); font-family: var(--font-display); font-weight: 800;
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
  border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 18px color-mix(in srgb, var(--brand-accent) 40%, transparent); }
.btn-ghost {
  background: transparent; color: rgba(255,255,255,0.5);
  font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
  border: 1px solid #1C2238; border-radius: 7px; padding: 6px 12px; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-ghost:hover { border-color: color-mix(in srgb, var(--brand-accent) 40%, transparent); color: var(--brand-accent); }

/* SIDEBAR NAV */
.sidebar-nav-btn {
  display: flex; align-items: center;
  padding: 12px 20px; border: none; cursor: pointer;
  background: transparent; width: 100%; text-align: left;
  border-left: 2px solid transparent;
  color: rgba(255,255,255,0.42);
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.sidebar-nav-btn:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.8); }
.sidebar-nav-btn.active {
  background: color-mix(in srgb, var(--brand-accent) 8%, transparent);
  color: var(--brand-accent);
  border-left-color: var(--brand-accent);
}

/* DASHBOARD GRID */
.dash-content { padding: 0 36px 48px; display: flex; flex-direction: column; gap: 14px; }
.grid-2-1 { display: grid; grid-template-columns: 1.55fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

/* VIDEO CARD — matches .card surface + brand-accent hover ring */
.video-card {
  flex-shrink: 0; width: 248px;
  background: color-mix(in srgb, var(--brand-surface) 60%, var(--brand-bg));
  border: 1px solid #141929; border-radius: 12px; overflow: hidden;
  cursor: pointer; transition: transform 0.2s, border-color 0.2s, background 0.25s ease;
}
.video-card:hover { transform: translateY(-4px); border-color: color-mix(in srgb, var(--brand-accent) 30%, transparent); }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; }

/* MOBILE NAV */
.mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,6,16,0.97); backdrop-filter: blur(20px); border-top: 1px solid #141929; z-index: 400; padding: 10px 0 20px; }

/* RESPONSIVE */
@media (max-width: 1200px) { .locker-desktop { display: none !important; } }
@media (max-width: 1100px) {
  .grid-2-1 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
  .dash-main-grid { grid-template-columns: 1fr !important; }
}
@media (max-width: 768px) {
  .dash-sidebar { display: none !important; }
  .dash-shell::before { display: none; }
  .dash-content { padding: 0 14px 80px; }
  .grid-3 { grid-template-columns: 1fr; }
  .mobile-bottom-nav { display: flex !important; }
  .locker-toggle-btn { display: none; }
}
</style>

<script type="text/babel">
const QUOTES = [
  { quote: "The difference between the impossible and the possible lies in a person's determination.", author: "Tommy Lasorda", title: "MLB Manager" },
  { quote: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky", title: "NHL Legend" },
  { quote: "It's not whether you get knocked down, it's whether you get up.", author: "Vince Lombardi", title: "NFL Coach" },
  { quote: "Hard work beats talent when talent doesn't work hard.", author: "Tim Notke", title: "Coach" },
  { quote: "Champions keep playing until they get it right.", author: "Billie Jean King", title: "Tennis Legend" },
  { quote: "The more difficult the victory, the greater the happiness in winning.", author: "Pelé", title: "Soccer Legend" },
  { quote: "I've failed over and over and over again in my life. And that is why I succeed.", author: "Michael Jordan", title: "NBA Legend" },
  { quote: "You have to believe in yourself when no one else does.", author: "Serena Williams", title: "Tennis GOAT" },
  { quote: "Talent wins games, but teamwork and intelligence win championships.", author: "Michael Jordan", title: "NBA Legend" },
  { quote: "The secret is to work less as individuals and more as a team.", author: "Knute Rockne", title: "Notre Dame Coach" },
  { quote: "Somewhere behind the athlete you've become is the little kid who fell in love with the game.", author: "Mia Hamm", title: "Soccer Legend" },
  { quote: "Do not let what you cannot do interfere with what you can do.", author: "John Wooden", title: "UCLA Coach" },
];

function QuoteBanner() {
  const week = Math.floor(Date.now() / (7 * 24 * 60 * 60 * 1000));
  const { quote, author, title } = QUOTES[week % QUOTES.length];
  return (
    <div style={{ padding: '0 36px', marginBottom: 20 }}>
      <div style={{
        position: 'relative', overflow: 'hidden',
        background: 'linear-gradient(135deg, color-mix(in srgb, var(--brand-surface) 60%, var(--brand-bg)) 0%, color-mix(in srgb, var(--brand-accent) 6%, var(--brand-bg)) 100%)',
        borderRadius: 14, padding: '28px 40px 24px', textAlign: 'center',
        transition: 'background 0.25s ease',
      }}>
        <div style={{
          position: 'absolute', top: -10, left: '50%', transform: 'translateX(-50%)',
          fontFamily: 'Georgia, serif', fontSize: 140, lineHeight: 1,
          color: 'color-mix(in srgb, var(--brand-accent) 5%, transparent)', fontWeight: 900, pointerEvents: 'none', userSelect: 'none',
        }}>"</div>
        <p style={{
          fontFamily: 'var(--font-body, Georgia, serif)',
          fontSize: 26, fontStyle: 'italic', fontWeight: 500,
          lineHeight: 1.6, color: 'rgba(255,255,255,0.82)',
          margin: '0 auto', marginBottom: 18, position: 'relative', zIndex: 1, maxWidth: 800,
        }}>"{quote}"</p>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
          <div style={{ width: 24, height: 2, background: 'var(--brand-accent)', borderRadius: 2 }} />
          <div>
            <span style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 13, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--brand-accent)' }}>{author}</span>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'rgba(255,255,255,0.38)', textTransform: 'uppercase', letterSpacing: '0.12em', marginLeft: 10 }}>{title}</span>
          </div>
          <div style={{ width: 24, height: 2, background: 'var(--brand-accent)', borderRadius: 2 }} />
        </div>
      </div>
    </div>

}

function ScoutStatsCard() {
  const stats = [
    { label: 'Receptions', value: '67' },
    { label: 'Rec. Yards', value: '1,142', gold: true },
    { label: 'Touchdowns', value: '11' },
    { label: 'Yds / Catch', value: '17.0' },
    { label: 'Long', value: '78 yds' },
    { label: 'Games', value: '13' },
  ];
  const physical = [['6\'2"','Height'],['205 lbs','Weight'],['4.42s','40-Yard'],['38.5"','Vertical']];
  return (
    <div className="card" style={{ padding: 22 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18 }}>
        <div style={{
          background: 'rgba(41,82,255,0.1)', border: '1px solid rgba(41,82,255,0.22)',
          borderRadius: 6, padding: '3px 10px',
          fontFamily: 'var(--font-mono)', fontSize: 9.5, color: '#7B9FFF',

        }}>◆ Scout Mode · 2024 Season</div>
        <div style={{ flex: 1, height: 1, background: '#141929' }} />
      </div>

            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'rgba(255,255,255,0.42)', textTransform: 'uppercase', letterSpacing: '0.12em', marginTop: 4 }}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{ height: 1, background: '#141929', marginBottom: 18 }} />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10 }}>
        {physical.map(([v, l], i) => (
          <div key={i} style={{ textAlign: 'center' }}>

            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'rgba(255,255,255,0.38)', textTransform: 'uppercase', letterSpacing: '0.12em', marginTop: 3 }}>{l}</div>

const VIDEOS = [
  { title: '78-Yd TD vs Michigan',         views: 284000, earned: 892, duration: '0:38', hot: true },
  { title: 'Route Running Masterclass',    views: 112000, earned: 341, duration: '1:12' },
  { title: 'Season Highlights 2024',       views: 98000,  earned: 312, duration: '3:24' },
  { title: 'One-Handed Grab vs Penn State',views: 67000,  earned: 201, duration: '0:22' },
  { title: 'Spring Practice Reel',         views: 23000,  earned: 71,  duration: '2:15' },
];
const fmtV = n => n >= 1000 ? (n/1000).toFixed(0)+'K' : n;
const fmtE = n => '$'+n.toLocaleString();
const GRAD = ['135deg,#0A1A6E,#1A3DCC','135deg,#0D1A40,#152A5E','135deg,#101830,#1C2A50','135deg,#0A1540,#14204E','135deg,#0C1835,#182848'];

function VideosRow() {
  const [sort, setSort] = React.useState('recent');
  const reelRef = React.useRef(null);
  const [atStart, setAtStart] = React.useState(true);
  const [atEnd, setAtEnd] = React.useState(false);

  const sorted = React.useMemo(() => {
    const v = [...VIDEOS];
    if (sort === 'views') v.sort((a,b) => b.views - a.views);
    if (sort === 'earned') v.sort((a,b) => b.earned - a.earned);
    return v;
  }, [sort]);

  const updateEdges = React.useCallback(() => {
    const el = reelRef.current; if (!el) return;
    setAtStart(el.scrollLeft <= 2);
    setAtEnd(el.scrollLeft >= el.scrollWidth - el.clientWidth - 2);
  }, []);

  React.useEffect(() => { updateEdges(); }, [sorted, updateEdges]);

  const scrollBy = (dir) => {
    const el = reelRef.current; if (!el) return;
    const card = el.querySelector('.video-card');
    const step = card ? (card.offsetWidth + 12) * 2 : 400;

      <div style={{ height:1, background:'#141929', margin:'12px 0' }} />
      <div style={{ padding:'0 10px', overflow:'hidden' }}><ScoutModeTogglePill /></div>
      <div style={{ flex:1 }} />

      <div style={{ borderTop:'1px solid #141929' }}>
        <button className="sidebar-nav-btn" style={{ gap:0 }}>
          <span style={{ flexShrink:0, display:'flex', width:28, justifyContent:'center' }}>{V2Icons.settings}</span>
          <span className="sb-label" style={{ marginLeft:10 }}>Settings</span>
        </button>
        <div style={{ display:'flex', alignItems:'center', gap:0, padding:'12px 18px', overflow:'hidden' }}>
          <div style={{
            width:30, height:30, borderRadius:'50%', flexShrink:0,
            background:'linear-gradient(135deg, var(--brand-accent-2), var(--brand-accent))',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontFamily:'var(--font-display)', fontWeight:900, fontSize:11, color:'var(--brand-bg)',
          }}>DC</div>
          <div className="sb-label" style={{ marginLeft:10, lineHeight:1.35 }}>
            <div style={{ fontFamily:'var(--font-display)', fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.02em', color:'#fff' }}>Darius Cole</div>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.35)', textTransform:'uppercase', letterSpacing:'0.1em', marginTop:1 }}>WR #1 · Ohio State</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// LIVE PREVIEW + THEME PANEL
// Anchored to docs/planning/dashboard-plan.md:
//   - P3 / Audit #6: free preset themes, premium hex + custom fonts
//   - Audit #3:    try-then-paywall for premium edits (preview free, save gated)
//   - Design unresolved #2: "View as fan" toggle on preview iframe
//   - Eng #1:      "Saving…" pulse + "View Live" outbound link
//   - Eng #2 / R6: WCAG AA contrast check at picker time
// ──────────────────────────────────────────────────────────────────────────

// accent2 = the bright highlight shade. For BLTZ Classic this is the real --bltz-gold-bright
// (#FFB940), not a math-lightened #F5A623 — important because warm accents at low opacity on dark
// bg desaturate to muddy brown, so the grid/highlight needs a perceptually brighter source color.
const THEME_PRESETS = [
  { id:'bltz-classic', name:'BLTZ Classic',  bg:'#0A0B16', accent:'#F5A623', accent2:'#FFB940', surface:'#131829', text:'#FFFFFF' },
  { id:'cal-blue',     name:'Cal Blue',      bg:'#001E62', accent:'#FDB515', accent2:'#FFD75A', surface:'#003478', text:'#FFFFFF' },
  { id:'buckeye',      name:'Buckeye',       bg:'#0E0E0E', accent:'#BB0000', accent2:'#E63333', surface:'#1A1A1A', text:'#FFFFFF' },
  { id:'crimson',      name:'Crimson Tide',  bg:'#0A0A0A', accent:'#9E1B32', accent2:'#C8324A', surface:'#1A1A1A', text:'#FFFFFF' },
  { id:'volunteer',    name:'Volunteer',     bg:'#0E0E0E', accent:'#FF8200', accent2:'#FFAA40', surface:'#1F1F1F', text:'#FFFFFF' },
  { id:'wolverine',    name:'Wolverine',     bg:'#00274C', accent:'#FFCB05', accent2:'#FFE066', surface:'#003263', text:'#FFFFFF' },
  { id:'longhorn',     name:'Longhorn',      bg:'#0A0A0A', accent:'#BF5700', accent2:'#DD8033', surface:'#1A1A1A', text:'#FFFFFF' },
  { id:'midnight',     name:'Midnight Mono', bg:'#0E1116', accent:'#FFFFFF', accent2:'#FFFFFF', surface:'#1F232C', text:'#E5E7EB' },
];

const FONT_PAIRS = [
  { id:'barlow',    name:'Barlow',         display:'Barlow',          body:'Barlow',           premium:false },
  { id:'oswald',    name:'Oswald · Inter', display:'Oswald',          body:'Inter',            premium:true  },
  { id:'archivo',   name:'Archivo Black',  display:'Archivo Black',   body:'Archivo',          premium:true  },
  { id:'space',     name:'Space Grotesk',  display:'Space Grotesk',   body:'Space Grotesk',    premium:true  },
  { id:'editorial', name:'Editorial New',  display:'PP Editorial New',body:'Inter',            premium:true  },
];

function V2PreviewToggle({ open, onClick }) {
  return (
    <button className={`locker-toggle-btn${open ? ' panel-open' : ''}`} onClick={onClick} aria-label="Live preview & theme">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
        <path d="M10 4.5C5 4.5 2 10 2 10s3 5.5 8 5.5 8-5.5 8-5.5-3-5.5-8-5.5z" stroke="currentColor" strokeWidth="1.5"/>
        <circle cx="10" cy="10" r="2.4" fill="currentColor"/>
      </svg>
      <span style={{ fontFamily:'var(--font-mono)', fontSize:8, textTransform:'uppercase', letterSpacing:'0.1em', writingMode:'vertical-rl', color:'inherit' }}>Preview</span>
    </button>

}

function V2PreviewPanel({ open, appliedTheme, appliedFontId, onSave }) {
  // In production this would come from a usePremium() hook reading lockers.tier (per Eng §5).
  const [premium, setPremium]   = React.useState(false);
  const [tab, setTab]           = React.useState('themes');  // 'themes' | 'colors' | 'fonts'

  // Detect whether the currently-applied theme matches a preset (and which one).
  const matchedPreset = React.useMemo(() => (
    THEME_PRESETS.find(t =>
      t.bg === appliedTheme.bg && t.accent === appliedTheme.accent &&
      t.surface === appliedTheme.surface && t.text === appliedTheme.text
    ) || null
  ), [appliedTheme]);

  // Pending state seeded from applied; reset reverts pending → applied.
  const [themeId, setThemeId]   = React.useState(matchedPreset ? matchedPreset.id : 'bltz-classic');
  const [fontId, setFontId]     = React.useState(appliedFontId);
  const [usingCustom, setUsingCustom] = React.useState(!matchedPreset);
  const [custom, setCustom]     = React.useState({ ...appliedTheme });
  const [showUpsell, setShowUpsell]   = React.useState(false);
  const [savingPulse, setSavingPulse] = React.useState(false);
  const [dirty, setDirty]             = React.useState(false);

  const baseTheme   = THEME_PRESETS.find(t => t.id === themeId) || THEME_PRESETS[0];
  const activeTheme = usingCustom ? custom : baseTheme;
  const activeFont  = FONT_PAIRS.find(f => f.id === fontId) || FONT_PAIRS[0];

  const premiumDirty = usingCustom || fontId !== 'barlow';

  // Plan Eng §1: 200ms "Saving..." pulse on patch send.
  const pulse = () => { setSavingPulse(true); setTimeout(() => setSavingPulse(false), 220); };

  const applyTheme = (id) => {
    const t = THEME_PRESETS.find(p => p.id === id);
    if (!t) return;
    setThemeId(id); setUsingCustom(false); setDirty(true);
    setCustom({ bg:t.bg, accent:t.accent, surface:t.surface, text:t.text });
    pulse();
  };
  const applyCustom = (key, val) => { setCustom(c => ({ ...c, [key]: val })); setUsingCustom(true); setDirty(true); pulse(); };
  const pickFont    = (id) => { setFontId(id); setDirty(true); pulse(); };
  const reset       = () => {
    if (matchedPreset) { setThemeId(matchedPreset.id); setUsingCustom(false); }
    else               { setUsingCustom(true); }
    setCustom({ ...appliedTheme });
    setFontId(appliedFontId);
    setDirty(false);
  };
  const save        = () => {
    if (!premium && premiumDirty) { setShowUpsell(true); return; }
    const themeOut = usingCustom ? { ...custom } : { ...baseTheme };
    onSave?.(themeOut, fontId);
    setDirty(false); pulse();
  };

  return (
    <div className={`locker-desktop${open ? ' open' : ''}`} style={{ display:'flex', flexDirection:'column', position:'sticky' }}>
      {/* HEADER — sync status + view-live link (Eng §1) */}
      <div style={{ padding:'22px 16px 12px', borderBottom:'1px solid #141929', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <span style={{
              width:7, height:7, borderRadius:'50%',
              background: savingPulse ? '#FFB940' : (dirty ? '#F5A623' : '#33D17A'),
              boxShadow: savingPulse ? '0 0 8px rgba(255,185,64,0.7)' : (dirty ? '0 0 8px rgba(245,166,35,0.45)' : 'none'),
              transition:'background 0.15s, box-shadow 0.15s',
            }}/>
            <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.55)', textTransform:'uppercase', letterSpacing:'0.14em' }}>
              {savingPulse ? 'Saving' : dirty ? 'Preview only' : 'In sync'}
            </span>
          </div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.32)', textTransform:'uppercase', letterSpacing:'0.15em' }}>Live preview</div>
        </div>
        <div style={{ display:'flex', justifyContent:'flex-end', alignItems:'center', gap:8 }}>
          <a href="locker-page.html" target="_blank" rel="noreferrer" style={{
            fontFamily:'var(--font-mono)', fontSize:9, color:'#F5A623',
            textDecoration:'none', letterSpacing:'0.1em', textTransform:'uppercase',
            border:'1px solid rgba(245,166,35,0.28)', borderRadius:5, padding:'4px 8px', flexShrink:0,
          }}>↗ View live</a>
        </div>
      </div>

      {/* PREVIEW IFRAME (faked mini-locker, theme + font reactive) — fan-facing only; claim state is BLTZ-controlled */}
      <div style={{ padding:'14px 14px 16px', display:'flex', justifyContent:'center', flexShrink:0 }}>
        <div style={{ position:'relative', width:'100%', maxWidth:240 }}>
          <div style={{
            width:'100%', background:activeTheme.bg,
            border:'1px solid #1C2238', borderRadius:22, overflow:'hidden',
            boxShadow:'0 16px 48px rgba(0,0,0,0.5)',
            fontFamily:activeFont.body,
            transition:'background 0.18s',
          }}>
            <div style={{ height:16, display:'flex', alignItems:'center', justifyContent:'center', background:'#000' }}>
              <div style={{ width:54, height:8, borderRadius:5, background:activeTheme.bg }}/>
            </div>
            <div style={{ height:80, position:'relative', background:`linear-gradient(135deg, ${activeTheme.surface}, ${activeTheme.bg})`, overflow:'visible' }}>
              <div style={{ position:'absolute', inset:0, background:`linear-gradient(${activeTheme.accent}22 1px,transparent 1px),linear-gradient(90deg,${activeTheme.accent}22 1px,transparent 1px)`, backgroundSize:'14px 14px', overflow:'hidden' }}/>
              <div style={{ position:'absolute', bottom:0, left:0, right:0, height:20, background:`linear-gradient(to bottom,transparent, ${activeTheme.bg})`, pointerEvents:'none' }}/>
              <div style={{
                position:'absolute', bottom:-19, left:'50%', transform:'translateX(-50%)', zIndex:2,
                width:38, height:38, borderRadius:'50%',
                background:`linear-gradient(135deg, ${activeTheme.accent}, ${activeTheme.surface})`,
                border:`2px solid ${activeTheme.bg}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:activeFont.display, fontWeight:900, fontSize:13, color:activeTheme.bg,
                boxShadow:'0 4px 12px rgba(0,0,0,0.4)',
              }}>DC</div>
            </div>
            <div style={{ padding:'26px 12px 14px', textAlign:'center' }}>
              <div style={{ fontFamily:activeFont.display, fontWeight:900, fontSize:15, textTransform:'uppercase', lineHeight:0.92, letterSpacing:'0.01em', color:activeTheme.text }}>Darius Cole</div>
              <div style={{ fontFamily:'var(--font-mono)', fontSize:8, color:`${activeTheme.text}99`, textTransform:'uppercase', letterSpacing:'0.1em', marginTop:4 }}>WR #1 · Ohio State</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:4, margin:'10px 0' }}>
                {[['67','REC'],['1,142','YDS'],['11','TD']].map(([v,l],i) => (
                  <div key={i} style={{ background:activeTheme.surface, borderRadius:5, padding:'5px 3px', textAlign:'center' }}>
                    <div style={{ fontFamily:activeFont.display, fontWeight:900, fontSize:12, color:activeTheme.accent }}>{v}</div>
                    <div style={{ fontFamily:'var(--font-mono)', fontSize:6.5, color:`${activeTheme.text}80`, textTransform:'uppercase', letterSpacing:'0.08em' }}>{l}</div>
                  </div>
                ))}
              </div>
              <button style={{ width:'100%', background:activeTheme.accent, color:activeTheme.bg, fontFamily:activeFont.display, fontWeight:800, fontSize:9.5, textTransform:'uppercase', letterSpacing:'0.08em', padding:'7px', border:'none', borderRadius:6, cursor:'pointer' }}>Follow Darius</button>
            </div>
          </div>
          {savingPulse && (
            <div style={{ position:'absolute', top:8, right:10, fontFamily:'var(--font-mono)', fontSize:8.5, color:'#FFB940', textTransform:'uppercase', letterSpacing:'0.12em', background:'rgba(7,8,15,0.9)', borderRadius:4, padding:'3px 6px', border:'1px solid rgba(255,185,64,0.4)' }}>● Syncing</div>
          )}
        </div>
      </div>

      {/* TABS */}
      <div style={{ padding:'0 16px', borderBottom:'1px solid #141929', display:'flex', gap:0, flexShrink:0 }}>
        {[
          { id:'themes', label:'Themes', premium:false },
          { id:'colors', label:'Colors', premium:true  },
          { id:'fonts',  label:'Fonts',  premium:true  },
        ].map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1, background:'transparent', border:'none', cursor:'pointer',
            padding:'10px 4px',
            borderBottom: tab===t.id ? '2px solid #F5A623' : '2px solid transparent',
            color: tab===t.id ? '#F5A623' : 'rgba(255,255,255,0.45)',
            fontFamily:'var(--font-mono)', fontSize:10, textTransform:'uppercase', letterSpacing:'0.12em',
            display:'inline-flex', alignItems:'center', justifyContent:'center', gap:5,
            transition:'color 0.15s, border-color 0.15s',
          }}>
            {t.label}
            {t.premium && <span style={{ fontSize:8, color:'#F5A623' }}>✦</span>}
          </button>
        ))}
      </div>

      {/* TAB CONTENT */}
      <div style={{ flex:1, overflowY:'auto', padding:'14px 16px' }}>
        {tab === 'themes' && (
          <>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8 }}>
              {THEME_PRESETS.map(t => {
                const selected = themeId === t.id && !usingCustom;
                return (
                  <button key={t.id} onClick={()=>applyTheme(t.id)} style={{
                    background:'transparent', border: selected ? '1px solid #F5A623' : '1px solid #1C2238',
                    borderRadius:7, padding:8, cursor:'pointer', textAlign:'left',
                    transition:'border-color 0.15s',
                  }}>
                    <div style={{ display:'flex', height:28, borderRadius:4, overflow:'hidden', marginBottom:6 }}>
                      <div style={{ flex:1, background:t.bg }}/>
                      <div style={{ flex:1, background:t.accent }}/>
                      <div style={{ flex:1, background:t.surface }}/>
                    </div>
                    <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color: selected ? '#F5A623' : 'rgba(255,255,255,0.7)', textTransform:'uppercase', letterSpacing:'0.08em', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                      <span>{t.name}</span>
                      {selected && <span>✓</span>}
                    </div>
                  </button>
                );
              })}
            </div>
          </>
        )}

        {tab === 'colors' && (
          <>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.4)', textTransform:'uppercase', letterSpacing:'0.14em', marginBottom:4 }}>Custom palette {!premium && <span style={{ color:'#F5A623' }}>· Premium</span>}</div>
            <div style={{ fontFamily:'var(--font-body)', fontSize:11, color:'rgba(255,255,255,0.5)', marginBottom:12, lineHeight:1.4 }}>
              {premium ? 'Pick your colors. Changes apply instantly.' : 'Pick any colors to preview. Saving requires Premium.'}
            </div>
            {[
              { key:'bg',      label:'Background' },
              { key:'accent',  label:'Accent'     },
              { key:'surface', label:'Surface'    },
              { key:'text',    label:'Text'       },
            ].map(slot => (
              <div key={slot.key} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
                <label style={{ position:'relative', width:34, height:34, borderRadius:6, overflow:'hidden', border:'1px solid #1C2238', cursor:'pointer', flexShrink:0 }}>
                  <input type="color" value={custom[slot.key]} onChange={e=>applyCustom(slot.key, e.target.value)} style={{ position:'absolute', inset:0, opacity:0, cursor:'pointer' }}/>
                  <div style={{ width:'100%', height:'100%', background:custom[slot.key] }}/>
                </label>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.5)', textTransform:'uppercase', letterSpacing:'0.1em' }}>{slot.label}</div>
                  <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'#fff', marginTop:2 }}>{custom[slot.key].toUpperCase()}</div>
                </div>
              </div>
            ))}
            {!premium && (
              <div style={{ marginTop:12, padding:12, border:'1px solid rgba(245,166,35,0.32)', borderRadius:8, background:'rgba(245,166,35,0.08)', boxShadow:'inset 0 0 0 1px rgba(245,166,35,0.06)' }}>
                <div style={{ fontFamily:'var(--font-display)', fontWeight:800, fontSize:13, color:'#F5A623', textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:4 }}>✦ Unlock with Premium</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:11, color:'rgba(255,255,255,0.6)', lineHeight:1.45, marginBottom:10 }}>Custom hex colors + premium fonts. 14-day free trial.</div>
                <button onClick={()=>setShowUpsell(true)} style={{ width:'100%', background:'linear-gradient(135deg,#FFB940,#F5A623)', color:'#0A0600', border:'none', borderRadius:6, padding:'8px', fontFamily:'var(--font-display)', fontWeight:800, fontSize:10, textTransform:'uppercase', letterSpacing:'0.08em', cursor:'pointer', boxShadow:'0 4px 14px rgba(245,166,35,0.25)' }}>Try free for 14 days</button>
              </div>
            )}
          </>
        )}

        {tab === 'fonts' && (
          <>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.4)', textTransform:'uppercase', letterSpacing:'0.14em', marginBottom:10 }}>Display + body pair {!premium && <span style={{ color:'#F5A623' }}>· Premium</span>}</div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {FONT_PAIRS.map(f => {
                const selected = fontId === f.id;
                return (
                  <button key={f.id} onClick={()=>pickFont(f.id)} style={{
                    background:'transparent', border: selected ? '1px solid #F5A623' : '1px solid #1C2238',
                    borderRadius:7, padding:'10px 12px', cursor:'pointer', textAlign:'left',
                    display:'flex', alignItems:'center', justifyContent:'space-between', gap:10,
                  }}>
                    <div style={{ minWidth:0 }}>
                      <div style={{ fontFamily:f.display, fontWeight:900, fontSize:18, color: selected ? '#F5A623' : '#fff', lineHeight:1, textTransform:'uppercase' }}>Aa</div>
                      <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'rgba(255,255,255,0.5)', textTransform:'uppercase', letterSpacing:'0.08em', marginTop:4 }}>{f.name}</div>
                    </div>
                    <div style={{ fontFamily:'var(--font-mono)', fontSize:9, textTransform:'uppercase', letterSpacing:'0.08em', display:'flex', alignItems:'center', gap:6 }}>
                      {f.premium && !premium && <span style={{ color:'#F5A623' }}>✦ Premium</span>}
                      {selected && <span style={{ color:'#F5A623' }}>✓ Active</span>}
                    </div>
                  </button>
                );
              })}
            </div>
          </>
        )}
      </div>

      {/* SAVE BAR */}
      <div style={{ padding:'12px 16px', borderTop:'1px solid #141929', flexShrink:0, background:'#050610' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:10 }}>
          <button onClick={reset} style={{ background:'transparent', border:'1px solid #1C2238', borderRadius:6, padding:'7px 10px', fontFamily:'var(--font-mono)', fontSize:9, textTransform:'uppercase', letterSpacing:'0.1em', color:'rgba(255,255,255,0.5)', cursor:'pointer' }}>Reset</button>
          <button onClick={save} disabled={!dirty} style={{
            flex:1,
            background: dirty ? (premiumDirty && !premium ? 'rgba(245,166,35,0.14)' : 'linear-gradient(135deg,#FFB940,#F5A623)') : '#131829',
            color: dirty ? (premiumDirty && !premium ? '#F5A623' : '#0A0600') : 'rgba(255,255,255,0.3)',
            border: dirty && premiumDirty && !premium ? '1px solid rgba(245,166,35,0.4)' : 'none',
            borderRadius:6, padding:'8px 10px',
            fontFamily:'var(--font-display)', fontWeight:800, fontSize:10, textTransform:'uppercase', letterSpacing:'0.08em',
            cursor: dirty ? 'pointer' : 'default', transition:'background 0.15s, border-color 0.15s',
            boxShadow: dirty && !(premiumDirty && !premium) ? '0 4px 14px rgba(245,166,35,0.25)' : 'none',
          }}>
            {!dirty ? 'All synced' : (premiumDirty && !premium) ? '✦ Unlock to save' : 'Save & publish'}
          </button>
        </div>
        <div style={{ marginTop:8, display:'flex', justifyContent:'space-between', alignItems:'center', fontFamily:'var(--font-mono)', fontSize:8.5, color:'rgba(255,255,255,0.3)', textTransform:'uppercase', letterSpacing:'0.1em' }}>
          <span>{premium ? '✦ Premium' : 'Free plan'}</span>
          <button onClick={()=>setPremium(p=>!p)} style={{ background:'transparent', border:'none', color:'rgba(255,255,255,0.25)', cursor:'pointer', fontFamily:'inherit', fontSize:'inherit', textTransform:'inherit', letterSpacing:'inherit' }}>demo · toggle premium</button>
        </div>
      </div>

      {/* UPSELL OVERLAY (try-then-paywall pattern, Audit #3) */}
      {showUpsell && (
        <div style={{ position:'absolute', inset:0, background:'rgba(5,6,16,0.92)', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', padding:18, zIndex:5 }}>
          <div style={{ background:'#0C0E1A', border:'1px solid rgba(245,166,35,0.4)', borderRadius:12, padding:18, maxWidth:280, boxShadow:'0 18px 48px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(245,166,35,0.06)' }}>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:'#F5A623', textTransform:'uppercase', letterSpacing:'0.14em', marginBottom:6 }}>✦ BLTZ Premium</div>
            <div style={{ fontFamily:'var(--font-display)', fontWeight:900, fontSize:20, textTransform:'uppercase', letterSpacing:'-0.01em', lineHeight:1, marginBottom:8 }}>Make your locker yours</div>
            <div style={{ fontFamily:'var(--font-body)', fontSize:12, color:'rgba(255,255,255,0.6)', lineHeight:1.5, marginBottom:14 }}>Custom hex colors, premium fonts, and deeper analytics. Your changes are kept — saving publishes them live.</div>
            <button onClick={()=>{ setPremium(true); setShowUpsell(false); }} style={{ width:'100%', background:'linear-gradient(135deg,#FFB940,#F5A623)', color:'#0A0600', border:'none', borderRadius:7, padding:'10px', fontFamily:'var(--font-display)', fontWeight:800, fontSize:11, textTransform:'uppercase', letterSpacing:'0.08em', cursor:'pointer', marginBottom:8, boxShadow:'0 6px 18px rgba(245,166,35,0.35)' }}>Start 14-day free trial</button>
            <button onClick={()=>setShowUpsell(false)} style={{ width:'100%', background:'transparent', border:'1px solid #1C2238', borderRadius:7, padding:'8px', fontFamily:'var(--font-mono)', fontSize:9.5, textTransform:'uppercase', letterSpacing:'0.1em', color:'rgba(255,255,255,0.5)', cursor:'pointer' }}>Keep previewing</button>
          </div>
        </div>
      )}

}

Object.assign(window, { V2Sidebar, V2PreviewPanel, V2PreviewToggle, V2MobileNav, ScoutModeTogglePill, THEME_PRESETS, FONT_PAIRS });

// Brand defaults — match :root CSS vars (BLTZ Classic).
const DEFAULT_BRAND_THEME = THEME_PRESETS[0];
const DEFAULT_BRAND_FONT  = 'barlow';

// Lighten a hex by mixing with white — derives an accent-2 highlight when a custom palette is saved.
function _lightenHex(hex, amt = 0.18) {
  const c = (hex || '').replace('#','');
  if (c.length !== 6) return hex;
  const [r,g,b] = [0,2,4].map(i => parseInt(c.substr(i,2),16));
  const m = (v) => Math.round(v + (255 - v) * amt).toString(16).padStart(2,'0');
  return '#' + m(r) + m(g) + m(b);
}

function DashApp() {
  const [page, setPage] = React.useState(
    () => localStorage.getItem('bltz-v2-page') || 'dashboard'
  );
  const [previewOpen, setPreviewOpen] = React.useState(false);

  // Persisted brand theme — lifted out of the panel so saves recolor the dashboard.
  const [appliedTheme, setAppliedTheme] = React.useState(() => {
    try {
      const raw = localStorage.getItem('bltz-brand-theme');
      if (raw) {
        const parsed = JSON.parse(raw);
        if (!parsed.accent2) {
          // Migration for state saved before accent2 existed: prefer the curated preset value
          // when the persisted palette matches a known preset (e.g. BLTZ Classic should snap
          // back to the official #FFB940), otherwise math-derive it.
          const matched = THEME_PRESETS.find(t =>
            t.bg === parsed.bg && t.accent === parsed.accent &&
            t.surface === parsed.surface && t.text === parsed.text
          );
          parsed.accent2 = (matched && matched.accent2) || _lightenHex(parsed.accent, 0.2);
        }
        return parsed;
      }
    } catch (e) { /* ignore */ }
    return {
      bg:      DEFAULT_BRAND_THEME.bg,
      accent:  DEFAULT_BRAND_THEME.accent,
      accent2: DEFAULT_BRAND_THEME.accent2 || _lightenHex(DEFAULT_BRAND_THEME.accent, 0.2),
      surface: DEFAULT_BRAND_THEME.surface,
      text:    DEFAULT_BRAND_THEME.text,
    };
  });
  const [appliedFontId, setAppliedFontId] = React.useState(
    () => localStorage.getItem('bltz-brand-font') || DEFAULT_BRAND_FONT
  );

  React.useEffect(() => { localStorage.setItem('bltz-v2-page', page); }, [page]);

  // Push brand → CSS custom properties + persist. The dashboard's gold/accent surfaces
  // (sidebar active state, .btn-gold, V2Hero glows + jersey badge) read these vars.
  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--brand-bg',       appliedTheme.bg);
    root.style.setProperty('--brand-accent',   appliedTheme.accent);
    // Prefer the preset's curated accent2 (e.g. BLTZ Classic → real --bltz-gold-bright #FFB940);
    // fall back to a math-lightened accent when a custom palette has no curated highlight.
    root.style.setProperty('--brand-accent-2', appliedTheme.accent2 || _lightenHex(appliedTheme.accent, 0.2));
    root.style.setProperty('--brand-surface',  appliedTheme.surface);
    root.style.setProperty('--brand-text',     appliedTheme.text);

    const font = FONT_PAIRS.find(f => f.id === appliedFontId) || FONT_PAIRS[0];
    root.style.setProperty('--font-display', `'${font.display}', Barlow, Oswald, Impact, sans-serif`);
    root.style.setProperty('--font-body',    `'${font.body}', Barlow, Inter, system-ui, sans-serif`);

    try {
      localStorage.setItem('bltz-brand-theme', JSON.stringify(appliedTheme));
      localStorage.setItem('bltz-brand-font',  appliedFontId);
    } catch (e) { /* ignore */ }
  }, [appliedTheme, appliedFontId]);

  const handleBrandSave = (themeOut, fontIdOut) => {
    setAppliedTheme({
      bg:      themeOut.bg,
      accent:  themeOut.accent,
      accent2: themeOut.accent2 || _lightenHex(themeOut.accent, 0.2),
      surface: themeOut.surface,
      text:    themeOut.text,
    });
    setAppliedFontId(fontIdOut);
  };

  return (
    <>
      <div className="dash-shell">
        <V2Sidebar active={page} setActive={setPage} />
        <div className="dash-main">
          {page === 'dashboard' ? <V2DashboardPage /> : <V2Placeholder name={page} />}
        </div>
        <V2PreviewPanel
          open={previewOpen}
          appliedTheme={appliedTheme}
          appliedFontId={appliedFontId}
          onSave={handleBrandSave}
        />
      </div>
      <V2PreviewToggle open={previewOpen} onClick={() => setPreviewOpen(v => !v)} />
      <V2MobileNav active={page} setActive={setPage} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DashApp />);
</script>
